# Nginx config for the aimicroapp SPA.
#
# - Serves static assets out of /usr/share/nginx/html with aggressive caching
#   for hashed `assets/*` files (Vite produces stable, content-hashed names).
# - Falls back to /index.html so React-Router style deep links work.
# - Reverse-proxies `/api/*` to the Fastify backend. The path prefix is
#   stripped to mirror the `/api` -> root rewrite used by Vite's dev proxy.
#
# The backend host defaults to `server:8787`, which is the service name used
# by docker-compose. Override with the `API_UPSTREAM` env var if needed.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed bundles — filename changes when content changes.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA fallback for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Reverse proxy to the backend. Strip the /api prefix so the upstream sees
  # the same paths used in code (e.g. /api/chat -> /chat on the server).
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE / WebSocket compatibility (chat & slidev streaming).
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;

    rewrite ^/api/?(.*)$ /$1 break;
    proxy_pass http://server:8787;
  }

  # Generic gzip — assets/HTML/JSON. Brotli would need a custom nginx build.
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml;
}
